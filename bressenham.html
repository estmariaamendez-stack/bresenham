<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Línea con Bresenham</title>
</head>
<style>
body{
    font-family: Arial;
    text-align: center;
}

.contenedor{
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 40px;
    margin-top: 20px;
}

canvas{
    border: 1px solid black;
}

table{
    border-collapse: collapse;
}

td, th{
    padding: 5px;
    border: 1px solid black;
}
</style>

<body>
<h2>Taller 2.2</h2>
X0: <input type="number" id="x0">
Y0: <input type="number" id="y0">
X1: <input type="number" id="x1">
Y1: <input type="number" id="y1">
<script>
 //Se crea la funcion dibujar 
function dibujar(){

    //llamado a la funcion para que realice las aaciones
    dibujarEjes();
    //toma los valores que el usuario ingrese 
   let x0 = parseInt(document.getElementById("x0").value);
    let y0 = parseInt(document.getElementById("y0").value);
    let x1 = parseInt(document.getElementById("x1").value);
    let y1 =/**convierte de texto a numeros*/ parseInt(document.getElementById("y1").value);
    // Validación de datos para asegurar los valores correctos y los datos 
    if(isNaN(x0) || isNaN(y0) || isNaN(x1) || isNaN(y1)){
        alert("Por favor ingrese todos los valores correctamente");
        return;
    }
    // se ejecuta el algoritmo de bressenham
    bresenham(x0, y0, x1, y1);
    
}
//se crea la funcion para tener los ejes en el grafico como nos pide el enunciado
function dibujarEjes(){
    const canvas = document.querySelector("canvas");
    const ctx = canvas.getContext("2d");

    // Limpiar el canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dibujar el eje X
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    ctx.lineTo(canvas.width, canvas.height);
    ctx.stroke();

    // Dibujar el eje Y
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, canvas.height);
    ctx.stroke();

    // Dibujar escala en X
    for(let i = 0; i < canvas.width; i += 20){
        ctx.fillText(i/20, i, canvas.height - 5);
    }

    // Dibujar escala en Y
    for(let j = 0; j < canvas.height; j += 20){
        ctx.fillText(j/20, 0, canvas.height - j);
    }
}
/**
 * punto en el canvas según coordenadas cartesianas
 * @param {number} x - Coordenada X
 * @param {number} y - Coordenada Y
 */
//funcion para dibujar un punto 
function plot(x, y){
    const canvas = document.querySelector("canvas");
    const ctx = canvas.getContext("2d");

    // Tamaño de cada unidad (escala) para que cada punto tenga su espacio y sea visible
    const escala = 20;


    let px = x * escala;
    //inicia el canvas de abajo izquierda como manejamos normalmente el plano cartesiano 
    let py = canvas.height - (y * escala);

    ctx.fillRect(px, py, 3, 3);
}
/**
 * Implementación del algoritmo de líneas de Bresenham.
 * @param {number} x0 - Coordenada X inicial.
 * @param {number} y0 - Coordenada Y inicial.
 * @param {number} x1 - Coordenada X final.
 * @param {number} y1 - Coordenada Y final.
 * @param {Function} plot - Función para dibujar el píxel (x, y).
 */
//se implementa la funcion  de bressenham para lineas  dada por el profe en el enunciado 
function bresenham(x0, y0, x1, y1){

//Busca la tabla
 const tabla = document.getElementById("tabla");
 //reinica la tabla para inicar en limpio y no ir acomomulando 
    tabla.innerHTML = "";
// Cálculo de diferenciales y dirección del paso
    let dx = Math.abs(x1 - x0);
    let dy = Math.abs(y1 - y0);

    let sx = (x0 < x1) ? 1 : -1;
    let sy = (y0 < y1) ? 1 : -1;

    let err = dx - dy;
    //se corrige error y se inicializa
    let paso = 0; 

    while(true){

         // Dibujar el punto actual
        plot(x0, y0);

        // Agregar fila a la tabla
        tabla.innerHTML += `
        <tr>
            <td>${paso}</td>
            <td>${x0}</td>
            <td>${y0}</td>
            <td>${err}</td>
        </tr>`;
   // Condición de finalización
        if(x0 === x1 && y0 === y1) break;

        let e2 = 2 * err;

         // Ajuste en el eje X
        if(e2 > -dy){
            err -= dy;
            x0 += sx;
        }

         // Ajuste en el eje Y
        if(e2 < dx){
            err += dx;
            y0 += sy;
        }
        paso++;
    }
}
//funcion para limpiar el canvas y la tabla 
function limpiar(){
    const canvas = document.querySelector("canvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    document.getElementById("tabla").innerHTML = "";
}
</script>

<!-- Se corrige el boton, ya que presentaba un error -->
<button onclick="dibujar()">Dibujar Linea</button>
<!-- se crea boton para limpiar cnavas y tabla -->
<button onclick="limpiar()">Limpiar</button>


<br><br>

<div class="contenedor">

    <canvas width="500" height="500"></canvas>

    <div>
        <h3>Tabla de iteraciones</h3>
        <table border="1">
            <thead>
                <tr>
                    <th>Paso</th>
                    <th>X</th>
                    <th>Y</th>
                    <th>Error</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>

</div>

</table>

</body>

</html>
