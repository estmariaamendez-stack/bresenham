<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Línea con Bresenham</title>
</head>
<body>
<h2>Algoritmo de Bresenham</h2>
X0: <input type="number" id="x0">
Y0: <input type="number" id="y0">
X1: <input type="number" id="x1">
Y1: <input type="number" id="y1">
<script>
 //Se crea la funcion dibujar 
function dibujar(){

    //llamado a la funcion para que realice las aaciones
    dibujarEjes();
    // Prueba de la funcion plot
    plot(2,2);
    plot(3,3);
    plot(4,4);
    
}
//se crea la funcion para tener los ejes en el grafico como nos pide el enunciado
function dibujarEjes(){
    const canvas = document.querySelector("canvas");
    const ctx = canvas.getContext("2d");

    // Limpiar el canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dibujar el eje X
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    ctx.lineTo(canvas.width, canvas.height);
    ctx.stroke();

    // Dibujar el eje Y
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, canvas.height);
    ctx.stroke();

    // Dibujar escala en X
    for(let i = 0; i < canvas.width; i += 20){
        ctx.fillText(i/20, i, canvas.height - 5);
    }

    // Dibujar escala en Y
    for(let j = 0; j < canvas.height; j += 20){
        ctx.fillText(j/20, 0, canvas.height - j);
    }
}
//funcion para dibujar un punto 
function plot(x, y){
    const canvas = document.querySelector("canvas");
    const ctx = canvas.getContext("2d");

    // Tamaño de cada unidad (escala) para que cada punto tenga su espacio y sea visible
    const escala = 20;


    let px = x * escala;
    //inicia el canvas de abajo izquierda como manejamos normalmente el plano cartesiano 
    let py = canvas.height - (y * escala);

    ctx.fillRect(px, py, 3, 3);
}
</script>
<!-- Se corrige el boton, ya que presentaba un error -->
<button onclick="dibujar()">Dibujar Linea</button>

<canvas width="500" height="500"></canvas>

</body>
</html>
